<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>U – 6D Universum‑Cube</title>

<style>
body {
    background: #000;
    color: #fff;
    font-family: monospace;
    margin: 0;
    padding: 0;
}

h1 {
    text-align: center;
    margin-top: 40px;
    font-size: 32px;
    color: #00aaff; /* U-Farbe: Blau-Spektrum */
}

/* 6D Scene */
.scene {
    width: 300px;
    height: 300px;
    perspective: 900px; /* GPU depth */
}

/* Cube Container */
.cube {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    animation: rotateCube 12s infinite linear;
}

/* General Face Style */
.face {
    position: absolute;
    width: 300px;
    height: 300px;
    border: 2px solid #00aaff; /* U-Farbe */
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    background: rgba(0, 100, 255, 0.15); /* U-Farbe transparent */
}

/* 6D Faces */
.front  { transform: rotateY(  0deg) translateZ(150px); }
.back   { transform: rotateY(180deg) translateZ(150px); }
.right  { transform: rotateY( 90deg) translateZ(150px); }
.left   { transform: rotateY(-90deg) translateZ(150px); }
.top    { transform: rotateX( 90deg) translateZ(150px); }
.bottom { transform: rotateX(-90deg) translateZ(150px); }

/* Rotation */
@keyframes rotate
